AccessModifiers:

1. public : can be accessed inside and outside of the class
2. protected: can be accessed inside the class as well as the related class --> relationship--> inherit
3. private: not accessible outisde the class --> give permission to access or to rewrite "get" and "set"
4. readonly: constant/final --> cannot change the assigned value
5. static: belongs to the class and not to the object --> can be accessed without creating the object of the class.


🔹 When do we use static in a TypeScript framework?

We use static when the data or behavior is:

✅ Common for the entire framework
✅ Does NOT depend on object state
✅ Utility / helper / configuration
✅ Shared across tests, pages, or services

1️⃣ Static for Constants & Configuration
📌 Use case

URLs
Timeouts
Environment names
Browser types

class Config {
  static BASE_URL = "https://leaftaps.com";
  static TIMEOUT = 5000;
}

Usage (no object needed)
await page.goto(Config.BASE_URL);


✔ Single source of truth
✔ Easy to maintain

