Scenario 1 — Login System (Very Realistic)
class User {

  private password: string = "";

  setPassword(pass: string) {

    if(pass.length >= 8)
      this.password = pass;
    else
      console.log("Weak password");

  }

}
Why?

Password must follow rules.
