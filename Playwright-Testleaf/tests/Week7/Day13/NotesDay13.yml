Main Real-Time Reasons
1️⃣ Data Security

Hide sensitive data.

Example:

Password

Salary

Bank balance

2️⃣ Validation

Example:

Age must be > 0
Salary must be > 0
Password length >= 8
3️⃣ Prevent Mistakes

Team members cannot accidentally modify values.

4️⃣ Maintain Control

Later you can change logic without affecting users.

Example:

getSalary() {
 return this.salary * 1.1 // bonus added
}

Outside code unchanged.