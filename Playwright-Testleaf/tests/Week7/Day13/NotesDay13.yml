When do we actually need child constructor?

Only when child wants to:

Accept new parameters

Initialize new properties

Add extra logic

Modify parent behavior

Example:

class HR extends EmployeeSignUp {

    department: string

    constructor(dept: string) {
        super()   // Parent initialization
        this.department = dept // Child initialization
    }
}


Now parent cannot handle this, because:

Parent doesn't know what department is.

So child needs its own constructor.

