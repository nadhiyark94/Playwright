Class and Object:


Real life example of Class and Object, Properties and Methods:

###  What is a *Class*?

A *class* is like a *blueprint* or *template* for creating something.

Think of it like this:
When a car company (like Toyota) designs a new model — say the *Innova* — they first create a *design or blueprint*.
That blueprint has details like:

* The engine type
* Number of seats
* Fuel capacity
* Basic shape and dimensions

But the *blueprint itself is not a car* — it’s just a design or a plan.

Script:
-------

class Car {

//properties => variables

accel="Accelerator";
brake="Brakes"

//methods => Actionables

startEngine(){
console.log("Press Accelerator")
}

stopEngine(){
console.log("Press Brakes")
}

}

const obj = new Car() // Object created
obj.startEngine()
obj.stopEngine()


