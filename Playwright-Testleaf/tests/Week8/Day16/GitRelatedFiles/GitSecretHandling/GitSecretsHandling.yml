
# 1️⃣ How to Set GitHub Secrets

### Step 1

Go to your GitHub repository:

**Repository → Settings → Secrets and variables → Actions → New repository secret**

Add these secrets:

| Secret Name      | Value                |
| ---------------- | -------------------- |
| SF_CLIENT_ID     | (Your client id)     |
| SF_CLIENT_SECRET | (Your client secret) |
| SF_USERNAME      | (Your username)      |
| SF_PASSWORD      | (Your password)      |

Example:

```
SF_CLIENT_ID = 3MVG9VMBZCsTL9hnYa...
SF_CLIENT_SECRET = 045B87EED908...
SF_USERNAME = ravindran...
SF_PASSWORD = Ravitestleaf#1234
```

---

# 2️⃣ Set your YAML  ✅

env:
  SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
  SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
  SF_USERNAME: ${{ secrets.SF_USERNAME }}
  SF_PASSWORD: ${{ secrets.SF_PASSWORD }}


GitHub Actions will automatically expose them as:

```
process.env.SF_CLIENT_ID
process.env.SF_CLIENT_SECRET
process.env.SF_USERNAME
process.env.SF_PASSWORD
```

---

# 3️⃣ Your Playwright Code is Correct ✅

This is correct:

 form: {
          "client_id": process.env.SF_CLIENT_ID as string,
          "client_secret": process.env.SF_CLIENT_SECRET as string,
          "username": process.env.SF_USERNAME as string,
          "password": process.env.SF_PASSWORD as string,
          "grant_type": "password"
        }

---

# 4️⃣ dotenv.config() Explanation

dotenv.config(); // For local execution only


### Local Run

```
npx playwright test
```

Reads from:

.env

---

### GitHub Run

GitHub Secrets → process.env

`.env` is NOT used in GitHub.

---

---

#  Important Security Rule 🚨

Never push `.env` to GitHub.

Add `.gitignore`:

.env
---

#  Final Architecture

### Local

```
.env → dotenv → process.env
```

### GitHub

```
Secrets → env → process.env
```

Same code works in both.

---

# Quick Test

Add this test:

```ts
console.log(process.env.SF_USERNAME);
```

### Local

Should print username.

### GitHub Actions

Should print masked value.

